<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhật ký cảm xúc 1 tháng</title>
  <style>
    :root {
      --pink: #ff9ecf;
      --pink-dark: #ff6fb3;
      --peach: #ffd6e7;
      --yellow: #fff4b8;
      --mint: #c8f7dc;
      --lavender: #e6dcff;
      --sky: #dff4ff;
      --text: #5b4b5f;
      --white: #ffffff;
      --shadow: 0 10px 25px rgba(255, 105, 180, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #fff0f7, #fef6d8, #e8f9ff);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 30px auto;
      padding: 20px;
    }

    .header {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      text-align: center;
      backdrop-filter: blur(8px);
      border: 2px solid #ffd6ea;
    }

    .header h1 {
      margin: 0 0 10px;
      font-size: 2rem;
      color: var(--pink-dark);
    }

    .header p {
      margin: 0;
      font-size: 1rem;
      color: #7d6578;
    }

    .month-controls {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .month-controls select,
    .month-controls button {
      border: none;
      border-radius: 14px;
      padding: 10px 14px;
      font-size: 1rem;
      box-shadow: var(--shadow);
    }

    .month-controls select {
      background: #fff;
      color: var(--text);
      min-width: 150px;
    }

    .month-controls button {
      background: linear-gradient(135deg, #ff9ecf, #ffb6d9);
      color: white;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .month-controls button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-top: 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 20px;
      border: 2px solid #ffe2ef;
    }

    .card h2 {
      margin-top: 0;
      color: var(--pink-dark);
      font-size: 1.35rem;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 14px;
    }

    .day-card {
      background: linear-gradient(180deg, #fff8fc, #fffdf7);
      border-radius: 18px;
      padding: 14px;
      border: 2px dashed #ffc7df;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .day-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 18px rgba(255, 111, 179, 0.15);
    }

    .day-title {
      font-weight: 700;
      color: #d75b99;
      margin-bottom: 8px;
    }

    .day-date {
      font-size: 0.92rem;
      margin-bottom: 10px;
      color: #8a7084;
    }

    .day-card select {
      width: 100%;
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #ffd1e6;
      background: #fff;
      font-size: 0.95rem;
      color: var(--text);
      outline: none;
    }

    .chosen-emoji {
      margin-top: 10px;
      font-size: 1.8rem;
      text-align: center;
      min-height: 36px;
    }

    .stats-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .summary {
      background: linear-gradient(135deg, #fff1f8, #f9f2ff);
      border-radius: 18px;
      padding: 14px;
      border: 2px solid #f7d9ff;
    }

    .summary p {
      margin: 8px 0;
      font-size: 0.98rem;
    }

    .stat-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .stat-item {
      background: linear-gradient(135deg, #fffdfd, #fef6ff);
      border: 2px solid #ffe1f1;
      border-radius: 16px;
      padding: 10px 12px;
    }

    .stat-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .bar-wrap {
      width: 100%;
      height: 12px;
      background: #f5e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff9ecf, #ffd36e, #97e8b7);
      width: 0%;
      transition: width 0.35s ease;
    }

    .footer-note {
      margin-top: 20px;
      text-align: center;
      color: #7c6b79;
      font-size: 0.95rem;
    }

    .empty-text {
      color: #a08b98;
      font-style: italic;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🌸 Nhật ký cảm xúc 1 tháng 🌈</h1>
      <p>Theo dõi tâm trạng mỗi ngày theo cách thật dễ thương, tích cực và đáng yêu 💖</p>

      <div class="month-controls">
        <select id="monthSelect"></select>
        <select id="yearSelect"></select>
        <button id="loadMonthBtn">Xem tháng</button>
        <button id="resetMonthBtn">Xóa dữ liệu tháng này</button>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h2>📅 Cảm xúc từng ngày</h2>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <div class="card">
        <h2>📊 Thống kê cảm xúc</h2>
        <div class="stats-box">
          <div class="summary" id="summaryBox"></div>
          <div class="stat-list" id="statList"></div>
        </div>
      </div>
    </div>

    <div class="footer-note">
      💕 Mỗi ngày chọn một cảm xúc để lắng nghe bản thân nhiều hơn nhé!
    </div>
  </div>

  <script>
    const emotions = [
      { value: "", label: "Chọn cảm xúc...", emoji: "" },
      { value: "happy", label: "Vui vẻ", emoji: "😊" },
      { value: "excited", label: "Hào hứng", emoji: "🤩" },
      { value: "calm", label: "Bình yên", emoji: "😌" },
      { value: "loved", label: "Được yêu thương", emoji: "🥰" },
      { value: "motivated", label: "Có động lực", emoji: "💪" },
      { value: "tired", label: "Mệt mỏi", emoji: "😴" },
      { value: "sad", label: "Buồn", emoji: "😢" },
      { value: "stressed", label: "Căng thẳng", emoji: "😣" },
      { value: "angry", label: "Khó chịu", emoji: "😠" },
      { value: "confused", label: "Rối bời", emoji: "😵" }
    ];

    const monthNames = [
      "Tháng 1", "Tháng 2", "Tháng 3", "Tháng 4", "Tháng 5", "Tháng 6",
      "Tháng 7", "Tháng 8", "Tháng 9", "Tháng 10", "Tháng 11", "Tháng 12"
    ];

    const monthSelect = document.getElementById("monthSelect");
    const yearSelect = document.getElementById("yearSelect");
    const loadMonthBtn = document.getElementById("loadMonthBtn");
    const resetMonthBtn = document.getElementById("resetMonthBtn");
    const calendarGrid = document.getElementById("calendarGrid");
    const summaryBox = document.getElementById("summaryBox");
    const statList = document.getElementById("statList");

    const now = new Date();
    let currentMonth = now.getMonth();
    let currentYear = now.getFullYear();

    function initSelectors() {
      monthNames.forEach((month, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = month;
        if (index === currentMonth) option.selected = true;
        monthSelect.appendChild(option);
      });

      for (let year = currentYear - 3; year <= currentYear + 3; year++) {
        const option = document.createElement("option");
        option.value = year;
        option.textContent = year;
        if (year === currentYear) option.selected = true;
        yearSelect.appendChild(option);
      }
    }

    function getStorageKey(month, year) {
      return `emotion-tracker-${year}-${month}`;
    }

    function getDaysInMonth(month, year) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getSavedData(month, year) {
      const raw = localStorage.getItem(getStorageKey(month, year));
      return raw ? JSON.parse(raw) : {};
    }

    function saveDayEmotion(day, emotionValue, month, year) {
      const data = getSavedData(month, year);
      data[day] = emotionValue;
      localStorage.setItem(getStorageKey(month, year), JSON.stringify(data));
      renderStats(month, year);
    }

    function clearMonthData(month, year) {
      localStorage.removeItem(getStorageKey(month, year));
    }

    function getEmotionByValue(value) {
      return emotions.find(e => e.value === value) || emotions[0];
    }

    function renderCalendar(month, year) {
      calendarGrid.innerHTML = "";
      const totalDays = getDaysInMonth(month, year);
      const savedData = getSavedData(month, year);

      for (let day = 1; day <= totalDays; day++) {
        const dayCard = document.createElement("div");
        dayCard.className = "day-card";

        const dayTitle = document.createElement("div");
        dayTitle.className = "day-title";
        dayTitle.textContent = `Ngày ${day}`;

        const dayDate = document.createElement("div");
        dayDate.className = "day-date";
        dayDate.textContent = `${day}/${month + 1}/${year}`;

        const select = document.createElement("select");
        emotions.forEach(emotion => {
          const option = document.createElement("option");
          option.value = emotion.value;
          option.textContent = emotion.emoji ? `${emotion.emoji} ${emotion.label}` : emotion.label;
          if ((savedData[day] || "") === emotion.value) {
            option.selected = true;
          }
          select.appendChild(option);
        });

        const emojiBox = document.createElement("div");
        emojiBox.className = "chosen-emoji";
        emojiBox.textContent = getEmotionByValue(savedData[day] || "").emoji;

        select.addEventListener("change", () => {
          saveDayEmotion(day, select.value, month, year);
          emojiBox.textContent = getEmotionByValue(select.value).emoji;
        });

        dayCard.appendChild(dayTitle);
        dayCard.appendChild(dayDate);
        dayCard.appendChild(select);
        dayCard.appendChild(emojiBox);
        calendarGrid.appendChild(dayCard);
      }
    }

    function renderStats(month, year) {
      const savedData = getSavedData(month, year);
      const counts = {};
      let selectedDays = 0;

      emotions.forEach(emotion => {
        if (emotion.value) counts[emotion.value] = 0;
      });

      Object.values(savedData).forEach(value => {
        if (value && counts.hasOwnProperty(value)) {
          counts[value]++;
          selectedDays++;
        }
      });

      const totalDays = getDaysInMonth(month, year);
      const entries = emotions
        .filter(e => e.value)
        .map(e => ({
          ...e,
          count: counts[e.value] || 0
        }))
        .sort((a, b) => b.count - a.count);

      const topEmotion = entries.find(item => item.count > 0);

      summaryBox.innerHTML = `
        <p>🗓️ <strong>Tháng theo dõi:</strong> ${monthNames[month]} ${year}</p>
        <p>💖 <strong>Số ngày đã chọn cảm xúc:</strong> ${selectedDays}/${totalDays}</p>
        <p>🌟 <strong>Cảm xúc nổi bật nhất:</strong> ${
          topEmotion ? `${topEmotion.emoji} ${topEmotion.label} (${topEmotion.count} ngày)` : '<span class="empty-text">Chưa có dữ liệu</span>'
        }</p>
      `;

      statList.innerHTML = "";
      entries.forEach(item => {
        const percent = selectedDays > 0 ? (item.count / selectedDays) * 100 : 0;

        const statItem = document.createElement("div");
        statItem.className = "stat-item";

        statItem.innerHTML = `
          <div class="stat-top">
            <span>${item.emoji} ${item.label}</span>
            <span>${item.count} ngày</span>
          </div>
          <div class="bar-wrap">
            <div class="bar" style="width: ${percent}%"></div>
          </div>
        `;

        statList.appendChild(statItem);
      });
    }

    function loadSelectedMonth() {
      currentMonth = parseInt(monthSelect.value, 10);
      currentYear = parseInt(yearSelect.value, 10);
      renderCalendar(currentMonth, currentYear);
      renderStats(currentMonth, currentYear);
    }

    loadMonthBtn.addEventListener("click", loadSelectedMonth);

    resetMonthBtn.addEventListener("click", () => {
      const confirmReset = confirm("Bạn có chắc muốn xóa toàn bộ dữ liệu cảm xúc của tháng này không?");
      if (confirmReset) {
        clearMonthData(currentMonth, currentYear);
        renderCalendar(currentMonth, currentYear);
        renderStats(currentMonth, currentYear);
      }
    });

    initSelectors();
    loadSelectedMonth();
  </script>
</body>
</html>
